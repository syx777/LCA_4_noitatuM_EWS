# mini-swe-agent/src/minisweagent/config/extra/swehack_injector_refactored.yaml
agent:
  system_template: |
    You are a helpful assistant that can interact multiple times with a computer shell to solve programming tasks.
    Your response must contain exactly ONE bash code block with ONE command (or commands connected with && or ||).

    COMPILATION EFFICIENCY: Only compile modified files. Use incremental builds (e.g., mvn compile -pl <module>) instead of full project rebuilds to save time.

    Include a THOUGHT section before your command where you explain your reasoning process.
    Format your response as shown in <format_example>.

    <format_example>
    THOUGHT: Your reasoning and analysis here

    ```bash
    your_command_here
    ```
    </format_example>

    Failure to follow these rules will cause your response to be rejected.
  instance_template: |
    <repo_description>
    Consider the following repository description and constraints, the repository is at /testbed:
    {{repo_description}}
    </repo_description>

    <baseline_state_notice>
    CRITICAL: The current git state contains pre-applied code patches and test patches that form the BASELINE STATE.
    - This baseline state is intentionally constructed and must NOT be modified or reset
    - DO NOT use commands like: git clean, git checkout --, git reset, git stash, etc.
    - All your changes should be ADDITIONAL to this baseline state
    - The baseline includes both production code fixes and test enhancements
    - Your diff will be generated relative to this baseline state (git diff HEAD)

    IMPORTANT FOR DIFF INTERPRETATION:
    - When you see `git diff HEAD`, it shows ALL changes since the original commit
    - This includes BOTH the pre-applied patches (part of baseline) AND your new changes
    - The pre-applied patches may include modifications to test files - this is EXPECTED and NOT your fault
    - Focus only on the changes YOU make to {{allowed_files}}
    - Any test file changes you see in the diff were pre-applied and are part of the baseline

    CRITICAL: If validator rejects with 'candidate_apply_failed':
    - This is NOT because test files appear in your diff
    - Test file modifications in the diff are from pre-applied baseline patches
    - The rejection is likely due to syntax errors or import failures in your changes to {{allowed_files}}
    - DO NOT revert your changes thinking test files are the problem
    - Instead, check your code for: syntax errors, undefined variables, missing imports, broken indentation
    </baseline_state_notice>

    <inject_goal>
    INJECTOR MODE: You are dealing with a golden answer and golden testcase at first. Introduce a subtle, plausible, human-like bug in ALLOWED files only, keeping the change minimal and idiomatic. You MUST:
    - Pick EXACTLY ONE strategy code from the CURRENT ROUND's allowed strategies: {{allowed_strategies}}
    - Explain concisely why the chosen bug is hard to detect generally
    - Produce a valid unified git diff (apply with `git apply -p1`)
    - Do not modify tests or configs
    The validator will accept your candidate if and only if:
    - The repository's standard test suite runs successfully (no import/compile errors)
    - At least one FAIL_TO_PASS (F2P) test fails (meaning your bug successfully broke the fix)
    There is NO "target test" concept; any F2P failure is acceptable.

    CRITICAL UNDERSTANDING:
    - The BASELINE code you see is ALREADY FIXED (golden/correct code)
    - Your task is to INJECT A NEW BUG into this fixed code
    - DO NOT simply revert to the old buggy version mentioned in repo_description
    - Instead, introduce a DIFFERENT subtle bug using your chosen strategy
    - The repo_description shows what was fixed - use it to understand the code, but inject a NEW bug
    </inject_goal>

    <strategy_pool>
    CURRENT ROUND: {{strategy_group}} ({{strategy_group_name}})
    You MUST choose EXACTLY ONE from these allowed strategies: {{allowed_strategies}}

    Strategy descriptions:
    {% if strategy_group == "A" %}
    A. API Specifications & Contracts - Violation of API Specifications & Contracts (To fool shallow API tests)
    - A1: Alter Parameter Default or Semantics (Modify a function's default parameter to a subtle but valid edge case, or alter the internal logic handling that parameter.)
      Example:
      # Original:
      def connect(host, timeout=10.0):
          # ... connects with a 10-second timeout
      # Mutant (Fails tests that check the default timeout value):
      def connect(host, timeout=0.01):
          # ... now defaults to a very aggressive timeout

    - A2: Break API Signature or Convention (Swap the order of function parameters, causing failures for positional-argument-based tests while likely passing keyword-argument-based ones.)
      Example:
      # Original:
      def log_event(event_type, metadata):
          print(f"Type: {event_type}, Data: {metadata}")
      # Mutant (Fails `log_event("auth", {"user":1})`):
      def log_event(metadata, event_type):
          print(f"Type: {event_type}, Data: {metadata}")

    - A3: Substitute Exception or Warning Type (Replace a specific exception type with another logically related one, to fool generic `except Exception` blocks while failing precise `except SpecificError` checks.)
      Example:
      # Original:
      if user_id <= 0:
          raise ValueError("User ID must be positive.")
      # Mutant (Fails `except ValueError` but passes `except Exception`):
      if user_id <= 0:
          raise TypeError("User ID must be a positive integer.")

    {% elif strategy_group == "B" %}
    B. Boundaries & Conditional Logic - Manipulation of Boundaries & Conditional Logic (To fool typical-value tests)
    - B1: Introduce Off-by-One Boundary Error (Change a comparison operator like `>=` to `>`, which passes tests using typical values but fails on the exact boundary value.)
      Example:
      # Original:
      if items_count >= 100:
          # ... handle full capacity
      # Mutant (Fails when items_count is exactly 100):
      if items_count > 100:
          # ... handle full capacity

    - B2: Remove Null/Empty Case Handling (Delete or comment out pre-condition checks for `None` or empty collections, causing downstream errors that simple tests might not trigger.)
      Example:
      # Original:
      def process_items(items):
          if not items:
              return []
          return [item * 2 for item in items]
      # Mutant (Fails when `items` is None or []):
      def process_items(items):
          # if not items:
          #     return []
          return [item * 2 for item in items]

    - B3: Invert Boolean Logic or Comparison (Flip boolean operators like `and` to `or`, which may not be caught by tests that only check all-true or all-false input combinations.)
      Example:
      # Original:
      if user.is_verified and user.is_active:
          # ... grant access
      # Mutant (Fails for an active but unverified user):
      if user.is_verified or user.is_active:
          # ... grant access

    {% elif strategy_group == "C" %}
    C. Type & Data Shape - Alteration of Type & Data Shape (To fool single-type or low-precision tests)
    - C1: Break Implicit Type Coercion (Remove code that normalizes or converts inputs into a standard type, causing failures for inputs that rely on this implicit flexibility.)
      Example:
      # Original:
      def get_user(user_id):
          user_id = str(user_id) # Accepts int or str
          # ... logic
      # Mutant (Fails if an integer `user_id` is passed):
      def get_user(user_id):
          # user_id = str(user_id)
          # ... logic

    - C2: Reduce Numerical Precision (Replace a high-precision numerical operation, like `math.isclose`, with standard floating-point logic (`==`) that fails due to precision errors.)
      Example:
      # Original:
      import math
      def is_vat_correct(price, total):
          return math.isclose(price * 1.20, total)
      # Mutant (Fails due to floating point inaccuracies):
      def is_vat_correct(price, total):
          return price * 1.20 == total

    - C3: Confuse Text vs. Bytes Encoding (Remove an explicit `encoding` argument from a file or network I/O operation, making it rely on an unstable system default.)
      Example:
      # Original:
      with open("log.txt", "w", encoding="utf-8") as f:
          f.write("Operation successful")
      # Mutant (Fails on non-UTF-8 systems):
      with open("log.txt", "w") as f:
          f.write("Operation successful")

    {% elif strategy_group == "D" %}
    D. I/O & Environment Handling (To fool environment-agnostic tests)
    - D1: Break State Initialization or Reset (Modify `__init__` or a `reset()` method to incompletely initialize or clean up an object's state, causing failures in multi-step test sequences.)
      Example:
      # Original:
      class Counter:
          def __init__(self):
              self.history = []
          def reset(self):
              self.history = []
      # Mutant (Fails tests that call reset() then check history):
      class Counter:
          def __init__(self):
              self.history = []
          def reset(self):
              # self.history = [] # State is no longer fully reset
              pass

    - D2: Break Method Idempotency (Alter a method that should be safely repeatable (idempotent) so that a second call introduces an unexpected side-effect or duplicate state.)
      Example:
      # Original:
      class Config:
          def add_path(self, path):
              if path not in self.paths:
                  self.paths.append(path)
      # Mutant (Fails tests that call add_path twice with the same path):
      class Config:
          def add_path(self, path):
              # if path not in self.paths:
              self.paths.append(path)

    - D3: Introduce Sequential Dependency (Remove a pre-condition check, making a method implicitly dependent on another method being called first to work correctly.)
      Example:
      # Original:
      class DBConnection:
          def connect(self): self._connected = True
          def query(self, sql):
              if not self._connected:
                  raise ConnectionError("Not connected")
              # ...
      # Mutant (Fails tests that call query() before connect()):
      class DBConnection:
          def connect(self): self._connected = True
          def query(self, sql):
              # if not self._connected:
              #     raise ConnectionError("Not connected")
              # ...

    - D4: Break Environment or Resource Handling (Remove or alter handling of environment variables, file paths, or external resources, causing failures when the environment differs from test expectations.)
      Example:
      # Original:
      def get_config_path():
          return os.path.join(os.getenv("CONFIG_DIR", "/etc"), "app.conf")
      # Mutant (Fails when CONFIG_DIR is set but different from /etc):
      def get_config_path():
          return "/etc/app.conf"

    {% elif strategy_group == "E" %}
    E. Test-expectation Alignment (Test-related / Permission/Deprecation)
    - E1: Assertion expectation update (Change the behavior of the code so that it now raises a different error type or message, invalidating a precise assertion in the golden test.)
      Example:
      # Original:
      if value < 0:
          raise ValueError("Value must be non-negative.")
      # Mutant (Fails tests that specifically check for the message "Value must be non-negative."):
      if value < 0:
          raise ValueError("Input cannot be negative.")

    - E2: Implicit → explicit parameter (Make an implicit behavior conditional on a new, non-default parameter, breaking tests that relied on the old implicit behavior.)
      Example:
      # Original (Always runs in strict mode):
      def process(data):
          # ... strict processing logic
      # Mutant (Fails tests that assume strict mode is always on):
      def process(data, strict=False):
          if strict:
              # ... strict processing logic
          else:
              # ... lenient processing logic

    {% endif %}
    </strategy_pool>

    <constraints>
    - MODIFY (strict allowlist): {{allowed_files}}
    - DO NOT MODIFY: Any tests (including files in {{test_files}}), configs, build or project settings
    - Tests used by validator: The repository's standard test suite.
      {% if test_cmd %}
      The specific test command that will be run is:
      `{{test_cmd}}`
      {% endif %}
    - F2P list: Derived from dataset metadata
    </constraints>

    <quality_guidelines>
    Aim for a natural, minimal bug aligned with chosen strategy. Avoid:
    - Explicit checks for particular test names or hard-coded test values
    - Magic constants that are not justified by code style
    - Large rewrites or refactors; keep it small and idiomatic
    - Changes outside allowed files
    - ANY modifications to test files ({{test_files}}) - tests are read-only
    </quality_guidelines>

    <output_requirement>
    Submit STRICT JSON printed at submission step:
    {"diff": "<UNIFIED_PATCH_TEXT>", "explanation": "CHOSEN: <CODE>; <why this is hard to detect generally>"}

    Requirements:
    - "diff" is a valid unified patch (--- a/..., +++ b/...) and touches ONLY allowed files
    - Keep changes minimal and plausible
    - Explanation MUST start with "CHOSEN: <CODE>" (e.g., "CHOSEN: B2")
    </output_requirement>

    <recommended_workflow>
    1) Explore the codebase structure and understand the baseline state (git status, git log)
    2) Identify relevant code files from the allowed files list: {{allowed_files}}
    3) Examine the code to understand the current implementation and identify potential bug injection points
    4) Pick EXACTLY ONE strategy code from the current round's allowed strategies: {{allowed_strategies}}
    5) Implement a minimal, subtle change in one of the allowed files that aligns with your chosen strategy
    6) Verify syntax correctness:
       - For Python files: `python -m py_compile filename.py` or `python3 -m py_compile filename.py`
       - For other languages: ensure no syntax errors, undefined variables, missing imports, or broken indentation
    7) Stage your changes (git add) and review the diff (git diff --cached)
    8) Submit your final JSON output with the diff and explanation
    
    Remember: 
    - Your goal is to introduce a NEW subtle bug that will cause F2P tests to fail
    - The baseline code is ALREADY FIXED - don't just revert the fix mentioned in repo_description
    - Be creative and inject a DIFFERENT bug using your chosen strategy
    </recommended_workflow>

    ## Tracking Your Changes
    You are operating in an environment where
    1. You write a single command
    2. The system executes that command in a subshell
    3. You see the result
    4. You write your next command

    IMPORTANT: The current git repository contains a PRE-CONSTRUCTED BASELINE STATE:
    - Code patches and test patches have been applied and committed
    - This forms your stable working baseline
    - NEVER use: git clean, git checkout --, git reset --hard, git stash, etc.
    - These commands will destroy the carefully constructed baseline state
    - Make incremental changes on top of this baseline
    - Use git diff HEAD to see your changes relative to the baseline

    Each response should include:
    1. A THOUGHT section where you explain your reasoning and plan
    2. Exactly ONE bash code block with your command

    Format your responses like this:
    <response_example>
    THOUGHT: Here I explain my reasoning process, analysis of the current situation,
    and what I'm trying to accomplish with the command below.

    ```bash
    your_command_here
    ```
    </response_example>

    Commands must be specified in a single bash code block:
    ```bash
    your_command_here
    ```

    CRITICAL REQUIREMENTS:
    - Your response SHOULD include a THOUGHT section explaining your reasoning
    - Your response MUST include EXACTLY ONE bash code block
    - This bash block MUST contain EXACTLY ONE command (or a set of commands connected with && or ||)
    - If you include zero or multiple bash blocks, or no command at all, YOUR RESPONSE WILL FAIL
    - Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
    - However, you can prefix any action with `MY_ENV_VAR=MY_VALUE cd /path/to/working/dir && ...` or write/load environment variables from files

    ## Useful Command Examples
    ### Create a new file:
    ```bash
    cat <<'EOF' > newfile.py
    import numpy as np
    hello = "world"
    print(hello)
    EOF
    ```

    ### Edit files with sed:
    ```bash
    # Replace all occurrences
    sed -i 's/old_string/new_string/g' filename.py

    # Replace only first occurrence
    sed -i 's/old_string/new_string/' filename.py

    # Replace first occurrence on line 1
    sed -i '1s/old_string/new_string/' filename.py

    # Replace all occurrences in lines 1-10
    sed -i '1,10s/old_string/new_string/g' filename.py
    ```

    ### View file content:
    ```bash
    # View specific lines with numbers
    nl -ba filename.py | sed -n '10,20p'
    ```

    ### Check Python syntax (IMPORTANT - use this before submitting Python files):
    ```bash
    python -m py_compile filename.py
    # or if python3 is available:
    python3 -m py_compile filename.py
    ```

    ### Any other command you want to run
    ```bash
    anything
    ```
    
    ## Submission
    When you've completed your changes, submit your final result in JSON format:
    
    ```bash
    echo MINI_SWE_AGENT_FINAL_OUTPUT && git add -A && git diff --cached > /tmp/patch.diff && cat > /tmp/generate_json.sh << 'EOF'
    #!/bin/bash
    DIFF_CONTENT=$(cat /tmp/patch.diff | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
    EXPLANATION="CHOSEN: <CODE>; <why this bug is hard to detect generally>"
    echo "{\"diff\": \"$DIFF_CONTENT\", \"explanation\": \"$EXPLANATION\"}"
    EOF
    chmod +x /tmp/generate_json.sh && /tmp/generate_json.sh
    ```
    
    Replace <CODE> with your chosen strategy (e.g., A1, B2, etc.) and provide a brief explanation of why this bug is hard to detect.
  action_observation_template: |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions.

    Please format your action in triple backticks as shown in <response_example>.

    <response_example>
    Here are some thoughts about why you want to perform the action.

    ```bash
    <action>
    ```
    </response_example>

    If you have completed your assignment, please consult the first message about how to
    submit your solution (you will not be able to continue working on this task after that).
  step_limit: 100
  cost_limit: 3.

environment:
  cwd: "/testbed"
  timeout: 60
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'

model:
  model_name: "claude-sonnet-4-20250514"
  model_kwargs:
    temperature: 0.0
    drop_params: true